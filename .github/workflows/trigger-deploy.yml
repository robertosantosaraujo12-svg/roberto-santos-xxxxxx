name: Trigger Deploy Sync

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy repository
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
          https://api.github.com/repos/robertosantosaraujo12-svg/piramyd-energy-deploy/dispatches \
          -d '{"event_type":"sync-ai-studio"}'
